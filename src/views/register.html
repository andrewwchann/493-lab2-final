<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
</head>
<body>
  <main>
    <h1>Create Account</h1>
    <form method="post" action="/register" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>
      <p id="email-error" class="error" aria-live="polite"></p>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
      <p id="password-error" class="error" aria-live="polite"></p>

      <label for="account-type">Account Type</label>
      <select id="account-type" name="accountType" required>
        <option value="attendee" selected>Attendee</option>
        <option value="author">Author</option>
        <option value="editor">Editor</option>
      </select>
      <p id="account-type-error" class="error" aria-live="polite"></p>

      <button type="submit">Register</button>
    </form>
    <p id="form-errors" aria-live="polite"></p>
    <p>Already registered? <a href="/login">Go to Login</a>.</p>
  </main>
  <script>
    window.renderRegistrationErrors = function renderRegistrationErrors(errors) {
      var payload = window.__CMS_PAYLOAD || {};
      var values = payload.values || {};

      document.getElementById('email-error').textContent = errors.email || '';
      document.getElementById('password-error').textContent = errors.password || '';
      document.getElementById('account-type-error').textContent = errors.accountType || '';
      document.getElementById('form-errors').textContent = errors.form || '';

      if (typeof values.email === 'string') {
        document.getElementById('email').value = values.email;
      }
      if (typeof values.accountType === 'string') {
        document.getElementById('account-type').value = values.accountType;
      }
    };
  </script>
</body>
</html>
