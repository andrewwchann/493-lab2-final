<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft Submissions</title>
</head>
<body>
  <main>
    <h1>Draft Submissions</h1>
    <p id="draft-save-error" aria-live="polite"></p>
    <p id="draft-window-error" aria-live="polite"></p>
    <ul id="draft-list"></ul>
  </main>
  <script>
    window.renderDraftErrors = function renderDraftErrors(errors) {
      document.getElementById('draft-save-error').textContent = errors.save || '';
      document.getElementById('draft-window-error').textContent = errors.window || '';
    };
  </script>
</body>
</html>
