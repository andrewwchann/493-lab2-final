<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password</title>
</head>
<body>
  <main>
    <h1>Change Password</h1>
    <form method="post" action="/accounts/password" novalidate>
      <label for="currentPassword">Current Password</label>
      <input id="currentPassword" name="currentPassword" type="password" required>

      <label for="newPassword">New Password</label>
      <input id="newPassword" name="newPassword" type="password" required>

      <label for="confirmNewPassword">Confirm New Password</label>
      <input id="confirmNewPassword" name="confirmNewPassword" type="password" required>

      <button type="submit">Update Password</button>
    </form>
    <p id="form-error" aria-live="polite"></p>
    <p id="form-success" aria-live="polite"></p>
  </main>
  <script>
    window.renderPasswordErrors = function renderPasswordErrors(errors) {
      document.getElementById('form-error').textContent = errors.form || '';
      document.getElementById('form-success').textContent = '';
    };
  </script>
</body>
</html>
