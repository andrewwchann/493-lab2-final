<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit Paper</title>
</head>
<body>
  <main>
    <h1>Submit Paper</h1>
    <form method="post" action="/submissions" novalidate>
      <label for="title">Title</label>
      <input id="title" name="title" type="text" required>
      <p id="title-error" class="error" aria-live="polite"></p>

      <label for="authorNames">Author Names</label>
      <input id="authorNames" name="authorNames" type="text" required>
      <p id="authorNames-error" class="error" aria-live="polite"></p>

      <label for="affiliationOrContact">Affiliation or Contact Information</label>
      <input id="affiliationOrContact" name="affiliationOrContact" type="text" required>
      <p id="affiliationOrContact-error" class="error" aria-live="polite"></p>

      <label for="abstract">Abstract</label>
      <textarea id="abstract" name="abstract" required></textarea>
      <p id="abstract-error" class="error" aria-live="polite"></p>

      <label for="keywords">Keywords</label>
      <input id="keywords" name="keywords" type="text" required>
      <p id="keywords-error" class="error" aria-live="polite"></p>

      <label for="identifier">Draft Identifier (Optional)</label>
      <input id="identifier" name="identifier" type="text">
      <p id="identifier-error" class="error" aria-live="polite"></p>

      <label for="file">Manuscript</label>
      <input id="file" name="file" type="file" required>
      <p id="file-error" class="error" aria-live="polite"></p>

      <button type="submit">Submit</button>
      <button type="submit" formaction="/submissions/drafts/save" formmethod="post" formnovalidate>Save Draft</button>
    </form>
    <p id="submission-error" aria-live="polite"></p>
    <p id="submission-window-error" aria-live="polite"></p>
    <p id="draft-save-error" aria-live="polite"></p>
  </main>
  <script>
    window.renderSubmissionErrors = function renderSubmissionErrors(errors) {
      document.getElementById('title-error').textContent = errors.title || '';
      document.getElementById('authorNames-error').textContent = errors.authorNames || '';
      document.getElementById('affiliationOrContact-error').textContent = errors.affiliationOrContact || '';
      document.getElementById('abstract-error').textContent = errors.abstract || '';
      document.getElementById('keywords-error').textContent = errors.keywords || '';
      document.getElementById('identifier-error').textContent = errors.identifier || '';
      document.getElementById('file-error').textContent = errors.file || '';
      document.getElementById('submission-window-error').textContent =
        errors.form && /window/i.test(errors.form) ? errors.form : '';
      document.getElementById('submission-error').textContent =
        errors.form && !/window/i.test(errors.form) ? errors.form : '';
      document.getElementById('draft-save-error').textContent = errors.save || '';
    };
  </script>
</body>
</html>
