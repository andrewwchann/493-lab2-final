<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration Ticket</title>
</head>
<body>
  <main>
    <h1>Registration Ticket</h1>
    <div id="ticket-content"></div>
    <p id="ticket-error" aria-live="polite"></p>
  </main>
  <script>
    window.renderTicket = function renderTicket(payload) {
      var error = (payload.errors && payload.errors.form) || '';
      document.getElementById('ticket-error').textContent = error;

      if (payload.ticket) {
        document.getElementById('ticket-content').innerHTML =
          '<p>Ticket Reference: ' + payload.ticket.ticketReference + '</p>' +
          '<p>Attendee: ' + payload.ticket.attendeeName + '</p>' +
          '<p>Category: ' + payload.ticket.registrationCategory + '</p>' +
          '<p>Payment Confirmation: ' + payload.ticket.paymentConfirmationNumber + '</p>';
      } else {
        document.getElementById('ticket-content').innerHTML = '';
      }
    };
  </script>
</body>
</html>
