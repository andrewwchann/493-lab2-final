<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
</head>
<body>
  <main>
    <h1>Create Account</h1>
    <form method="post" action="/register" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>
      <p id="email-error" class="error" aria-live="polite"></p>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
      <p id="password-error" class="error" aria-live="polite"></p>

      <button type="submit">Register</button>
    </form>
    <p id="form-errors" aria-live="polite"></p>
  </main>
  <script>
    window.renderRegistrationErrors = function renderRegistrationErrors(errors) {
      document.getElementById('email-error').textContent = errors.email || '';
      document.getElementById('password-error').textContent = errors.password || '';
      document.getElementById('form-errors').textContent = errors.form || '';
    };
  </script>
</body>
</html>
