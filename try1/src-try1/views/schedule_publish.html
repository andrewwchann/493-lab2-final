<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publish Schedule</title>
</head>
<body>
  <main>
    <h1>Publish Schedule</h1>
    <form method="post" action="/schedule/publish">
      <label for="publish-schedule-id">Schedule ID</label>
      <input id="publish-schedule-id" name="scheduleId" type="number" required>

      <label>
        <input id="confirm-publish" name="confirmed" type="checkbox" value="true" required>
        I confirm this schedule is final and ready to publish.
      </label>

      <button type="submit">Publish Schedule</button>
    </form>

    <p id="schedule-publish-error" aria-live="polite"></p>
    <p id="schedule-publish-warning" aria-live="polite"></p>
    <p id="schedule-publish-success" aria-live="polite"></p>
  </main>
  <script>
    window.renderSchedulePublishResult = function renderSchedulePublishResult(payload) {
      document.getElementById('schedule-publish-error').textContent =
        (payload.errors && payload.errors.form) || '';
      document.getElementById('schedule-publish-warning').textContent = payload.notificationWarning || '';
      document.getElementById('schedule-publish-success').textContent =
        payload.schedule ? 'Schedule is now public.' : '';
    };
  </script>
</body>
</html>
